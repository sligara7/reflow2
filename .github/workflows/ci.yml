# CI — the done-gates from AGENTS.md, enforced on every push instead of on
# every agent remembering. Two jobs by cost:
#
# - `core` needs no RocksDB: the core crate's fast path (in-memory backend),
#   fmt/clippy, the schema validator, the installer suite, and the skill lint.
#   Feedback in a couple of minutes.
# - `full` pays the RocksDB C++ compile once (then rust-cache carries it): the
#   whole workspace including the MCP surface, then the instruments that drive
#   the REAL binary over stdio — smoke_mcp (the only layer that catches what
#   three agreeing home-grown clients once all missed), phase_trial (13/13,
#   explicitly a regression gate), model_the_loop and coherent_erosion_trial
#   (exit non-zero on regression). erosion_trial is deliberately absent: it
#   exits non-zero BY DESIGN until the ledger-judgement decision changes.
#
# ubuntu-22.04 to match release.yml, not -latest.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core gates (no RocksDB)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-core
      - name: Core tests (in-memory backend)
        run: cargo test -p reflow2-core --no-default-features
      - name: Clippy (core)
        run: cargo clippy -p reflow2-core --no-default-features --all-targets -- -D warnings
      - name: Format
        run: cargo fmt --check
      - name: Schema validates
        run: |
          python3 -m pip install --quiet pyyaml
          python3 tools/validate_schema.py
      - name: Installer suite (hermetic)
        run: python3 tools/test_init.py
      - name: Loop-nudge hook suite (hermetic)
        run: python3 tools/test_loop_nudge.py
      - name: Skill lint (skills' contract with the surface)
        run: python3 tools/skill_lint.py

  full:
    name: workspace + real-binary instruments
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-full
      - name: Workspace tests (both crates)
        run: cargo test --workspace
      - name: Clippy (mcp)
        run: cargo clippy -p reflow2-mcp --all-targets -- -D warnings
      - name: Build the served binary
        run: cargo build -p reflow2-mcp
      - name: Smoke test over real stdio
        run: python3 tools/smoke_mcp.py
      - name: Toolsnaps — served surface matches the committed goldens (BL-76)
        run: python3 tools/toolsnap.py
      - name: Phase-coverage trial (13/13 regression gate)
        run: python3 tools/phase_trial.py
      - name: Process-model probe
        run: python3 tools/model_the_loop.py
      - name: Coherent-erosion trial
        run: python3 tools/coherent_erosion_trial.py
