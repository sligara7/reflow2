# core.yaml — P0 Intent layer.
#
# The "why we're building this" foundation: the project itself, the needs it
# must satisfy, the limits it must respect, and the standards it adopts.
# Domain-neutral: a Project can be software, a physical product, a document,
# or a process.

schema:
  name: core
  version: 1

  node_types:

    Project:
      properties:
        name: { type: string, required: true, indexed: true, fulltext: true }
        domain: { type: string, indexed: true, description: "software / hardware / document / process / other — free text; scopes vocabulary examples, not validation." }
        description: { type: string, fulltext: true }
        objective: { type: string, description: "One-line statement of what success looks like." }
        mode: { type: enum, values: [flexible, rigid], default: flexible, description: "flexible = design evolves with the build; rigid = design is the source of truth." }
        status: { type: enum, values: [active, paused, archived], default: active, indexed: true }
        created_at: { type: string }
      embedding_field: description
      resolution: { strategy: fuzzy_then_vector, fuzzy_threshold: 85 }
      extraction_hint: >
        The top-level thing being designed and built. There is normally one
        Project per graph. Extracted from a brief, charter, or the opening
        framing of a design conversation.

    Requirement:
      properties:
        name: { type: string, required: true, indexed: true, fulltext: true }
        statement: { type: string, required: true, fulltext: true, description: "The need in the stakeholder's own terms." }
        kind: { type: enum, values: [functional, nonfunctional, quality, business], default: functional, indexed: true }
        concern: { type: enum, values: [core, logistics, sustainment, safety, security, cost, schedule, manufacturability, usability, environmental, other], default: core, indexed: true, description: "Cross-cutting concern this need belongs to. 'logistics'/'sustainment' cover the ILS considerations an SME surfaces (supply, transport, build method, maintenance)." }
        priority: { type: enum, values: [low, medium, high, critical], default: medium, indexed: true }
        source: { type: string, description: "Who/what stated it — a user, a regulation, a stakeholder." }
        rationale: { type: string }
        status: { type: enum, values: [proposed, accepted, deferred, dropped, met], default: proposed, indexed: true }
        provenance: { type: enum, values: [authored, planned, inferred, healed, reconciled, imported], default: authored, indexed: true, description: "How this node entered the graph. Same vocabulary as Fragment.provenance. `inferred` is the load-bearing one: a requirement read back out of the code that implements it is satisfied by construction and can never contradict anything, so it must be distinguishable from one a stakeholder actually stated." }
      embedding_field: statement
      resolution: { strategy: fuzzy_then_vector, fuzzy_threshold: 80 }
      extraction_hint: >
        A stated need or goal the design must satisfy — the bridge between raw
        intent and concrete Capabilities. Extract one per distinct need. A
        Capability later SATISFIES one or more Requirements.

    Constraint:
      properties:
        name: { type: string, required: true, indexed: true, fulltext: true }
        statement: { type: string, required: true, fulltext: true }
        category: { type: enum, values: [technical, business, operational, physical, regulatory, budget, schedule], default: technical, indexed: true }
        concern: { type: enum, values: [core, logistics, sustainment, safety, security, cost, schedule, manufacturability, usability, environmental, other], default: core, indexed: true, description: "Cross-cutting concern (ILS facet). Lets logistics/sustainment limits be filtered without a separate node type." }
        priority: { type: enum, values: [low, medium, high, critical], default: medium, indexed: true }
        rationale: { type: string }
        # BL-11: a numeric budget. `quantity` names what is budgeted with its
        # unit ("mass_kg", "latency_ms", "cost_usd"); `limit` is the number;
        # `direction` says which side violates. Contributions live on the
        # CONSTRAINS edges to the parts that spend the budget.
        quantity: { type: string, indexed: true, description: "Unit-bearing name of the budgeted quantity — e.g. mass_kg, latency_ms, power_w, cost_usd." }
        limit: { type: float, description: "The budget number, in the quantity's unit." }
        direction: { type: enum, values: [maximum, minimum], default: maximum, description: "maximum = total must stay at or under the limit; minimum = at or over." }
      embedding_field: statement
      resolution: { strategy: fuzzy_then_vector, fuzzy_threshold: 80 }
      extraction_hint: >
        A limit or rule the design MUST respect (vs. a Requirement, which is a
        goal to achieve). "Must run offline", "budget under $5k", "no PII
        leaves the device", "fits in a 2U rack". Nodes CONSTRAINS-linked to
        what they bind, or SATISFIES-linked from what honors them.

    DesignRule:
      properties:
        name: { type: string, required: true, indexed: true, fulltext: true }
        statement: { type: string, required: true, fulltext: true }
        category: { type: string, indexed: true, description: "tech_stack / convention / material / methodology / standard / style." }
        enforced: { type: bool, default: true, description: "Whether violations are gate-blocking." }
      embedding_field: statement
      resolution: { strategy: fuzzy_then_vector, fuzzy_threshold: 80 }
      extraction_hint: >
        A chosen standard or convention the build adopts — a tech-stack choice,
        a coding/style convention, a preferred material, a methodology. Broader
        than a Constraint: a rule you picked, not a limit imposed on you.

    Question:
      properties:
        question: { type: string, required: true, fulltext: true, description: "The question as it was actually put to the user, in their language." }
        gap_id: { type: string, required: true, indexed: true, description: "The gap this was asked about. Deterministic, so a later session finds the question without an index." }
        prompt_id: { type: string, indexed: true, description: "Id of the LLM request that phrased it, so identical phrasings are recognisable across sessions." }
        context_setter: { type: string, fulltext: true, description: "The 1-2 sentences that placed the user back in their own design." }
        rephrase_degraded: { type: bool, default: false, description: "True when phrasing fell back to the raw gap text — the question was still asked, and the record says how well." }
        asked_at: { type: string, description: "When it was put to the user." }
        answer: { type: string, fulltext: true, description: "What the user said, in their own words. The design nodes it produced are linked separately." }
        status: { type: enum, values: [asked, answered, withdrawn], default: asked, indexed: true }
      embedding_field: question
      resolution: { strategy: fuzzy_then_vector, fuzzy_threshold: 85 }
      extraction_hint: >
        A question already put to the user about a gap, and whether they have
        answered it. Not extracted from prose — authored by the DETECT→PROMPT
        loop so that a later session can tell what has already been asked
        instead of re-deriving and re-asking it. ASKS_ABOUT points at the nodes
        the gap concerned.

    Contributor:
      properties:
        name: { type: string, required: true, indexed: true, fulltext: true }
        description: { type: string, fulltext: true }
        kind: { type: enum, values: [person, automated_agent, organization], default: person, indexed: true, description: "What the contributor IS — a human, an automated coding agent (Claude Code, grok build), or an organization. An agent that acts on a person's behalf ACTS_FOR them (deferred rung)." }
        handle: { type: string, indexed: true, description: "Short stable handle used to coordinate — e.g. the COORD.md board handle (@ajs) or an agent's name. Lets the same contributor be recognised across sessions without matching on the display name." }
      embedding_field: description
      resolution: { strategy: fuzzy_then_vector, fuzzy_threshold: 82 }
      extraction_hint: >
        Who authors and decides the DESIGN itself — a person, an automated
        coding agent, or an organization. Distinct from an Actor, which is who
        the designed system SERVES: a Contributor sits on the *making* side, an
        Actor on the *use* side, and conflating them blurs two different
        lifecycles. A design node AUTHORED_BY a Contributor records whose word
        it is — the structured "who" behind provenance's "how" — and is the one
        identity the certainty doctrine, claims, and alternative-authorship all
        attach to. Not extracted from design prose; recorded from who is
        actually driving the session.

  edge_types:

    CONTAINS:
      from: ["Project", "Component"]
      to: "*"
      extraction_hint: >
        Ownership/containment: from the Project down to any node, and between
        Components to express the axis-Y decomposition spine (a system CONTAINS
        its subsystems CONTAINS its parts — see Component.level / matryoshka).
      properties:
        note: { type: string }

    SATISFIES:
      from: "*"
      to: "*"
      extraction_hint: >
        Source node (Capability, Component, Artifact...) fulfills a target
        Requirement or Constraint. The backbone of design traceability.
      properties:
        coverage: { type: enum, values: [full, partial, planned] }
        evidence: { type: string }

    AUTHORED_BY:
      from: "*"
      to: Contributor
      extraction_hint: >
        A design node was authored, reviewed, or approved by a Contributor —
        the structured "who" behind provenance's "how". Deliberately NOT a
        traceability edge: it is absent from the impact table (nodes.rs
        structural_rule) on purpose, so authorship never propagates a blast
        radius and never makes a Contributor a hub in the design network. It is
        design metadata on axis Z, the seed the claims and certainty threads
        build on.
      properties:
        role: { type: enum, values: [author, reviewer, approver], default: author, indexed: true, description: "How this contributor stood to the node — who wrote it, who reviewed it, whose sign-off it carries." }
        acted_at: { type: string, description: "ISO-8601 timestamp of the authorship act, if recorded." }

    ASKS_ABOUT:
      from: Question
      to: "*"
      extraction_hint: >
        The design nodes a question was raised about — the gap's affected set at
        the moment it was asked. Lets a node say "someone has already been asked
        about this", and lets an answered question stay reachable from the part
        of the design it settled.
      properties:
        note: { type: string }

    CONSTRAINS:
      from: "*"
      to: "*"
      extraction_hint: >
        A Constraint or DesignRule binds a target node. Source = the
        Constraint/DesignRule, target = what it limits.
      properties:
        note: { type: string }
        # BL-11: this target's share of the source Constraint's budget, in the
        # Constraint's quantity unit. An edge without one is REPORTED by
        # budget_report, never silently treated as zero.
        contribution: { type: float, description: "This target's spend against the budget, in the Constraint's quantity unit." }
        basis: { type: enum, values: [estimated, evidence, measured], default: estimated, description: "How the contribution was set — mirrors the coupling weight_basis rigor." }
